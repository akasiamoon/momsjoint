<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonshearth Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">
    <div class="kitchen-stage">
        
        <img src="momsjointday.jpg" id="bg-image" alt="Kitchen">
        <div id="seasonal-overlay"></div>
        <div class="atmosphere-overlay"></div>
        <div id="decor-layer"></div>

        <div id="bookshelf-trigger" class="trigger" onclick="togglePanel('bookshelf-panel')"></div>
        <div id="hearth-trigger" class="trigger" onclick="togglePanel('audio-menu')"></div>
        <div id="table-trigger" class="trigger" onclick="openApp('budget-ledger')"></div>

        <div id="weather-orb" onclick="fetchWeather()" title="Click to Refresh Signal">
            <div class="orb-content">
                <span id="orb-temp">--°</span>
                <span id="orb-loc">Farmington</span>
            </div>
        </div>

        <div id="ai-familiar-corner" onclick="pokeGoblin()">
            <div id="goblin-dialogue" class="hidden glass">I am watching the hearth, Keeper.</div>
            <img src="momsjointaigoblin.jpg" id="ai-goblin" alt="AI Familiar">
        </div>

        <div id="avatar-corner">
            <div id="avatar-stats-box" class="panel glass hidden">
                <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #8b6d32; padding-bottom: 5px; margin-bottom: 10px;">
                    <h2 class="panel-title" style="margin:0; border:none;">Keeper Amber</h2>
                    <span class="dismiss" onclick="togglePanel('avatar-stats-box')">CLOSE</span>
                </div>

                <div class="menu-section" style="margin-top: 0; padding-top: 0; border: none;">
                    <h3 style="color: #cda24b; margin-bottom: 5px;">Quick Logs</h3>
                    <div class="action-grid">
                        <button onclick="openApp('tea-log')">☕ Tea</button>
                        <button onclick="openApp('cat-log')">🐈 Cat</button>
                        <button onclick="openApp('phoebe-journal')">Phoebe</button>
                        <button onclick="openApp('tripp-journal')">Tripp</button>
                    </div>
                </div>
                
                <div class="stat-row" style="margin-top: 10px;">
                    <span>Vault Balance</span> 
                    <span id="vault-balance" style="color: var(--eso-gold); font-weight: bold;">0.00</span>
                </div>
