<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Kitchen Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <img src="image_8cf21b.jpg" alt="Cozy Kitchen" id="bg-image">

    <div id="window-zone"></div>
    
    <div id="sink-clock">00:00</div>

    <div id="avatar-corner">
        <button id="save-btn">💾 Save Data</button>
        <div id="account-balance">Balance: $0.00</div>
        <div id="daily-info">Loading today's info...</div>
    </div>

    <div id="hearth-zone" onclick="toggleFireplaceAudio()" title="Play Soundscape"></div>
    <audio id="hearth-audio" loop>
        <source src="fire-crackling.mp3" type="audio/mpeg"> 
    </audio>

    <div id="hidden-link-grid">
        <div class="hidden-item" onclick="openApp('todo')" title="To Do List"></div>
        <div class="hidden-item" onclick="openApp('meal-plan')" title="Weekly Meal Plan"></div>
        <div class="hidden-item" onclick="openApp('calendar')" title="Calendar"></div>
        <div class="hidden-item" onclick="openApp('market')" title="Market List"></div>
        
        <div class="hidden-item" onclick="openApp('bible')" title="Verse of the Day"></div>
        <div class="hidden-item" onclick="openApp('contingency-ledger')" title="Contingency Ledger"></div>
        <div class="hidden-item" onclick="openApp('recipes')" title="Recipes"></div>
        <div class="hidden-item" onclick="openApp('dev-ideas')" title="Dev Ideas"></div>
        
        <div class="hidden-item" onclick="openApp('mood')" title="Mood Log"></div>
        <div class="hidden-item" onclick="openApp('budget')" title="Budget Ledger"></div>
        <div class="hidden-item" onclick="openApp('notes')" title="Notes"></div>
        <div class="hidden-item" onclick="openApp('sleep')" title="Sleep Log"></div>
        
        <div class="hidden-item" onclick="openApp('meals')" title="Meal Log"></div>
        <div class="hidden-item" onclick="openApp('water')" title="Water Log"></div>
        <div class="hidden-item" onclick="openApp('self-care')" title="Self Care"></div>
        <div class="hidden-item" onclick="openApp('phoebe-tripp-cory')" title="Phoebe, Tripp, Cory"></div> 
    </div>

<script src="script.js"></script>
</body>
</html>
