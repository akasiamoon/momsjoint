<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Kitchen Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <img src="image_8cf21b.jpg" alt="Cozy Kitchen" id="bg-image">

    <div id="hidden-link-grid">
        <div class="hidden-item" onclick="openApp('todo')" title="To Do List"></div>
        <div class="hidden-item" onclick="openApp('weekly-meal-plan')" title="Weekly Meal Plan"></div>
        <div class="hidden-item" onclick="openApp('calendar')" title="Calendar"></div>
        <div class="hidden-item" onclick="openApp('market-list')" title="Market List"></div>
        <div class="hidden-item" onclick="openApp('bible-verse')" title="Bible Verse of the Day"></div>
        
        <div class="hidden-item" onclick="openApp('contingency-ledger')" title="Contingency Ledger"></div>
        <div class="hidden-item" onclick="openApp('recipes')" title="Recipes"></div>
        <div class="hidden-item" onclick="openApp('dev-ideas')" title="Web App & Gaming Dev Ideas"></div>
        <div class="hidden-item" onclick="openApp('mood-log')" title="Mood Log"></div>
        <div class="hidden-item" onclick="openApp('budget-ledger')" title="Budget Ledger"></div>
        
        <div class="hidden-item" onclick="openApp('notes')" title="Notes"></div>
        <div class="hidden-item" onclick="openApp('sleep-log')" title="Sleep Log"></div>
        <div class="hidden-item" onclick="openApp('meal-log')" title="Meal Log"></div>
        <div class="hidden-item" onclick="openApp('water-log')" title="Water Log"></div>
        <div class="hidden-item" onclick="openApp('self-care-log')" title="Self Care Log"></div>
        
        <div class="hidden-item" onclick="openApp('phoebe')" title="Phoebe"></div>
        <div class="hidden-item" onclick="openApp('tripp')" title="Tripp"></div>
        <div class="hidden-item" onclick="openApp('cory')" title="Cory"></div>
        <div class="hidden-item"></div> <div class="hidden-item"></div> </div>

    <div id="window-zone"></div>
    
    <div id="sink-clock">00:00</div>

<div id="avatar-corner">
        <img src="avatar.jpg" alt="My Avatar" id="user-avatar">
        
        <div class="avatar-buttons">
            <button id="save-btn" onclick="exportData()">💾 Export</button>
            <button id="load-btn" onclick="document.getElementById('import-file').click()">📂 Load</button>
            <input type="file" id="import-file" style="display: none;" onchange="importData(event)" accept=".json">
        </div>
        
        <div id="account-balance">Balance: $0.00</div>
        <div id="daily-info">Loading today's info...</div>
    </div>

    <div id="hearth-zone" onclick="toggleAudioMenu()" title="Open Soundscapes"></div>
    
    <div id="audio-menu" class="hidden">
        <h3>Hearth Soundscapes</h3>
        
        <div class="audio-section">
            <label for="ambient-select">Ambient Noise:</label>
            <select id="ambient-select" onchange="changeAudio('ambient')">
                <option value="fire.mp3">Crackling Fire</option>
                <option value="rain.mp3">Rainstorm</option>
                <option value="tavern.mp3">Busy Tavern</option>
            </select>
            <audio id="ambient-player" loop controls>
                <source src="fire.mp3" type="audio/mpeg">
            </audio>
        </div>

        <div class="audio-section">
            <label for="primary-select">Primary Audio (Music/Book):</label>
            <select id="primary-select" onchange="changeAudio('primary')">
                <option value="lofi.mp3">Lofi Beats</option>
                <option value="audiobook.mp3">Current Audiobook</option>
                <option value="podcast.mp3">Podcast</option>
            </select>
            <audio id="primary-player" controls>
                <source src="lofi.mp3" type="audio/mpeg">
            </audio>
        </div>
        
        <button onclick="toggleAudioMenu()">Close Menu</button>
    </div>
<div id="app-modal" class="hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">App Title</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal-body">
                </div>
            <div class="modal-footer">
                <button onclick="saveModalData()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
