<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamriel Cozy Kitchen Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <img src="Moonshearthfinal.jpg." alt="Cozy Kitchen" id="bg-image">

    <div id="table-zone" onclick="openApp('contingency-ledger')" title="Open Contingency Ledger"></div>
    <div id="bookshelf-trigger" onclick="toggleBookshelf()" title="Open Almanac & Lists"></div>

    <div id="bookshelf-panel" class="hidden">
        <div class="almanac-section">
            <h2 class="almanac-title">The Almanac</h2>
            <div id="almanac-header">
                <button onclick="changeMonth(-1)" class="almanac-nav">&#10094;</button>
                <span id="almanac-month-year"></span>
                <button onclick="changeMonth(1)" class="almanac-nav">&#10095;</button>
            </div>
            <div class="almanac-weekdays">
                <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
            </div>
            <div id="almanac-grid"></div>
            <div id="almanac-details">
                <p id="almanac-info">Select a day to view its records.</p>
            </div>
        </div>

        <div class="panel-section">
            <h3 class="collapsible-header" onclick="toggleSection('market-content')">Market List <span class="arrow">▼</span></h3>
            <div id="market-content" class="collapsible-content">
                <input type="text" id="market-input" placeholder="Inscribe item..." onkeypress="handleEnter(event, 'market')">
                <ul id="market-list"></ul>
                <button class="clear-btn" onclick="clearList('market')">Clear List</button>
            </div>
        </div>

        <div class="panel-section">
            <h3 class="collapsible-header" onclick="toggleSection('notes-content')">Notes <span class="arrow">▼</span></h3>
            <div id="notes-content" class="collapsible-content">
                <input type="text" id="notes-input" placeholder="Inscribe note..." onkeypress="handleEnter(event, 'notes')">
                <ul id="notes-list"></ul>
                <button class="clear-btn" onclick="clearList('notes')">Clear Notes</button>
            </div>
        </div>

        <div id="wax-seal" onclick="toggleTOC()" title="Open Table of Contents">
            <div class="seal-inner">TOC</div>
        </div>
    </div>

    <div id="toc-modal" class="hidden">
        <h2>Table of Contents</h2>
        <div id="toc-grid">
            <button onclick="openApp('todo')">To Do List</button>
            <button onclick="openApp('weekly-meal-plan')">Weekly Meal Plan</button>
            <button onclick="openApp('bible-verse')">Bible Verse</button>
            <button onclick="openApp('recipes')">Recipes</button>
            <button onclick="openApp('dev-ideas')">Dev Ideas</button>
            <button onclick="openApp('mood-log')">Mood Log</button>
            <button onclick="openApp('budget-ledger')">Budget Ledger</button>
            <button onclick="openApp('sleep-log')">Sleep Log</button>
            <button onclick="openApp('meal-log')">Meal Log</button>
            <button onclick="openApp('water-log')">Water Log</button>
            <button onclick="openApp('self-care-log')">Self Care Log</button>
            <button onclick="openApp('phoebe')">Phoebe</button>
            <button onclick="openApp('tripp')">Tripp</button>
            <button onclick="openApp('cory')">Cory</button>
        </div>
        <button class="close-toc" onclick="toggleTOC()">Close</button>
    </div>

    <div id="audio-menu" class="hidden">
        <h3>Hearth Soundscapes</h3>
        <div class="audio-section">
            <label>Ambient Noise:</label>
            <select id="ambient-select" onchange="changeAudio('ambient')">
                <option value="fire.mp3">Crackling Fire</option>
                <option value="rain.mp3">Rainstorm</option>
                <option value="tavern.mp3">Busy Tavern</option>
            </select>
            <audio id="ambient-player" loop controls><source src="fire.mp3" type="audio/mpeg"></audio>
        </div>
        <div class="audio-section">
            <label>Primary Audio:</label>
            <select id="primary-select" onchange="changeAudio('primary')">
                <option value="lofi.mp3">Lofi Beats</option>
                <option value="audiobook.mp3">Audiobook</option>
                <option value="bard.mp3">Tavern Bard</option>
            </select>
            <audio id="primary-player" controls><source src="lofi.mp3" type="audio/mpeg"></audio>
        </div>
        <button class="close-toc" onclick="toggleAudioMenu()">Close</button>
    </div>

    <div id="window-zone"></div>
    <div id="sink-clock">00:00</div>
    <div id="hearth-zone" onclick="toggleAudioMenu()"></div>
    
    <div id="avatar-corner">
        <img src="avatar.jpg" alt="My Avatar" id="user-avatar" onclick="toggleAvatarMenu()">
        <div id="avatar-stats-box" class="hidden">
            <div class="avatar-buttons">
                <button onclick="exportData()">💾 Export</button>
                <button onclick="document.getElementById('import-file').click()">📂 Load</button>
                <input type="file" id="import-file" style="display: none;" onchange="importData(event)" accept=".json">
            </div>
            <div id="account-balance">Vault Balance: $0.00</div>
            <div id="daily-info">Awaiting commands...</div>
        </div>
    </div>

    <div id="app-modal"> 
<div id="app-modal" class="hidden">
            <div class="modal-header">
                <h2 id="modal-title">App Title</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal-body"></div>
            <div class="modal-footer"><button onclick="saveModalData()">Inscribe to Ledger</button></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
