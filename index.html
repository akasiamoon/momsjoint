<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamriel Cozy Kitchen Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="atmosphere-overlay"></div>

    <img src="momsjointday.jpg" alt="Cozy Kitchen" id="bg-image">

    <div id="bookshelf-trigger" onclick="toggleBookshelf()" title="Open Almanac & Records"></div>
    <div id="hearth-trigger" onclick="toggleAudioMenu()" title="Open Soundscapes"></div>
    <div id="table-trigger" onclick="openApp('contingency-ledger')" title="Open Contingency Ledger"></div>

    <div id="bookshelf-panel" class="hidden glass">
        <h2 class="almanac-title">
            The Almanac
            <span class="close-text" onclick="toggleBookshelf()">Dismiss</span>
        </h2>
        
        <div id="almanac-header">
            <button onclick="changeMonth(-1)" class="almanac-nav">Prev</button>
            <span id="almanac-month-year"></span>
            <button onclick="changeMonth(1)" class="almanac-nav">Next</button>
        </div>

        <div class="almanac-weekdays">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
        </div>

        <div id="almanac-grid">
            </div>

        <div id="almanac-details">
            <p id="almanac-info">Select a day to view its records.</p>
        </div>

        <div class="panel-section">
            <h3 onclick="toggleSection('market-content')">Market List</h3>
            <div id="market-content" class="collapsible-content hidden">
                <input type="text" id="market-input" placeholder="Inscribe item..." onkeypress="handleEnter(event, 'market')">
                <ul id="market-list"></ul>
                <button class="clear-btn" onclick="clearList('market')">Purge List</button>
            </div>
        </div>

        <div id="wax-seal" onclick="toggleTOC()" title="Open Table of Contents">
            <div class="seal-inner">TOC</div>
        </div>
    </div>

    <div id="window-zone"></div>
    <div id="sink-clock">00:00</div>
    
    <audio id="ambient-player" loop></audio>
    <audio id="primary-player"></audio>
    
   <div id="avatar-corner">
    <div id="avatar-stats-box" class="hidden glass">
        <h2 class="character-title">Keeper Amber</h2>
        <div class="stat-row"><span>Vault</span> <span>0.00</span></div>
        <button onclick="exportData()">Export Scroll</button>
    </div>
    <img src="avatar.jpg" id="user-avatar" onclick="toggleAvatarMenu()">
</div>
        </div>
        <img src="avatar.jpg" alt="Character Sheet" id="user-avatar" onclick="toggleAvatarMenu()">
    </div>

    <div id="toc-modal" class="hidden glass">
        <div class="modal-content">
            <h2 class="cinzel-header">Master Journal</h2>
            <div id="toc-grid">
                <button onclick="openApp('todo')">Objectives</button>
                <button onclick="openApp('weekly-meal-plan')">Provisions</button>
                <button onclick="openApp('bible-verse')">Daily Verse</button>
                <button onclick="openApp('budget-ledger')">Ledger</button>
                <button onclick="openApp('phoebe')">Phoebe</button>
                <button onclick="openApp('tripp')">Tripp</button>
                <button onclick="openApp('journal')">Companion</button>
            </div>
            <button class="close-btn" onclick="toggleTOC()">Close Journal</button>
        </div>
    </div>

    <div id="app-modal" class="hidden glass">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="cinzel-header">App Title</h2>
                <span class="close-text" onclick="closeModal()">Dismiss</span>
            </div>
            <div id="modal-body">
                </div>
            <div class="modal-footer">
                <button onclick="saveModalData()">Inscribe</button>
                <button onclick="closeModal()">Dismiss</button>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
